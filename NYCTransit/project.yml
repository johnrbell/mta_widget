name: NYCTransit
options:
  bundleIdPrefix: com.johnrbell
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  NYCTransit:
    type: application
    platform: iOS
    sources:
      - path: NYCTransit
      - path: Shared
    resources:
      - path: Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: NYCTransit/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.johnrbell.NYCTransit
        CODE_SIGN_ENTITLEMENTS: NYCTransit/NYCTransit.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: StatusWidgetExtension
        embed: true

  StatusWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: StatusWidget
      - path: Shared
    resources:
      - path: Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: StatusWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.johnrbell.NYCTransit.StatusWidget
        CODE_SIGN_ENTITLEMENTS: StatusWidget/StatusWidget.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

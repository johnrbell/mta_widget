name: MTA Status Ingest

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest endpoint
        run: |
          curl -sf -X POST https://iosmtawid.vercel.app/api/ingest \
            -H "Authorization: Bearer ${{ secrets.INGEST_API_KEY }}"
